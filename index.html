      <div class="trg" style="background:white;border-color:${s2p.bd};color:${s2p.fg}"><div class="trg-l">Déclencheur</div><div class="trg-v">${d.s2.trig}</div><div class="trg-c">${d.s2.cond}</div></div>

      <div class="sl" style="background:${gc.light};border-color:${gc.bd};color:${gc.fg}"><span class="sl-k">Stop Loss</span><span class="sl-v">${d.s2.sl}</span></div>
    </div>
    <div class="sc" style="background:${s3p.bg}">
      <div class="sc-hd"><span class="sc-pill" style="color:${s3p.fg};background:${s3p.light};border-color:${s3p.bd}">S3</span><span style="font-size:11px;font-weight:600;color:${s3p.fg};letter-spacing:.05em">RANGE</span><span class="sc-tag" style="color:${s3p.fg};background:${s3p.light};border-color:${s3p.bd}">LIMITS</span></div>
      ${svgRng(s3p)}
      <div class="rng-zone">Zone · ${d.s3.lo} — ${d.s3.hi}</div>
      <div class="rng-card"><div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${gc.mid}"></div><div class="rng-k">Long · bas de range</div><div class="rng-v"><span class="rng-entry" style="color:${gc.fg}">${d.s3.eL}</span><span class="rng-sl">${d.s3.slL}</span></div></div>
      <div class="rng-card"><div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${rc.mid}"></div><div class="rng-k">Short · haut de range</div><div class="rng-v"><span class="rng-entry" style="color:${rc.fg}">${d.s3.eS}</span><span class="rng-sl">${d.s3.slS}</span></div></div>
      <div style="display:flex;align-items:center;justify-content:space-between;background:white;border-radius:6px;padding:7px 10px;border:1px solid var(--bdr)">
        <div><div style="font-size:8px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px">EV Haussier</div><span style="font-family:var(--mono);font-size:13px;font-weight:500;color:${gc.fg}">${d.evh}</span></div>
        <div style="width:1px;height:28px;background:var(--bdr)"></div>
        <div style="text-align:right"><div style="font-size:8px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px">EV Baissier</div><span style="font-family:var(--mono);font-size:13px;font-weight:500;color:${rc.fg}">${d.evb}</span></div>
      </div>
    </div>
  </div>
  <div class="ev-bar">
    <div class="ev-cell"><div class="ev-icon" style="background:${gc.light};color:${gc.fg};border-color:${gc.bd}">EV+</div><div><div class="ev-l">Espérance haussière</div><div class="ev-v" style="color:${gc.fg}">${d.evh}</div><div class="ev-s">Range prévis. ${d.rng}</div></div></div>
    <div class="ev-cell"><div class="ev-icon" style="background:${rc.light};color:${rc.fg};border-color:${rc.bd}">EV−</div><div><div class="ev-l">Espérance baissière</div><div class="ev-v" style="color:${rc.fg}">${d.evb}</div><div class="ev-s">Δ vs J-1 · ${d.delta}</div></div></div>
  </div>
  <div class="ftr">
    <span class="ftr-l"><span class="ftr-hi">KAM INC.</span> · 30/03/2026 · 07H50 · ${d.rank} ${d.id} · CONFIDENTIEL</span>
    <span class="ftr-r">50% TP1 / 50% TP2 · BE dès TP1</span>
  </div>
</div>`;
}
const tabs=document.getElementById('tabs'),cardsDiv=document.getElementById('cards');
D.forEach(d=>{
  const t=document.createElement('button');
  t.className='tab'+(d.id==='GC'?' on':'');
  t.innerHTML=`${d.rank}&nbsp;${d.id}`;
  t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.card').forEach(x=>x.classList.remove('on'));t.classList.add('on');document.getElementById('card-'+d.id).classList.add('on');};
  tabs.appendChild(t);cardsDiv.innerHTML+=mkCard(d);
});
</script>
</body>
</html>
